# =============================================================================
# Docker Compose - myPresence App
# =============================================================================
#
# Quick start:
#   docker compose up -d --build
#
# The application will be available at: http://localhost:8080
# Default admin login: admin / admin
#
# =============================================================================

services:
  mypresence:
    #build: .
    image: matoy/mypresence:latest
    container_name: mypresence-app
    restart: unless-stopped
    healthcheck:
      # Tente d'ouvrir un descripteur de fichier vers le port
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8080:8080"
    volumes:
      # Persistent volume for the SQLite database and files
      # Contains: app.db (database), logo.png (optional)
      # - mypresence-data:/data
      - ./mypresence-data:/data
    environment:
      # =====================================================================
      # GENERAL CONFIGURATION
      # =====================================================================

      # Internal listening port (external mapping is set in 'ports' above)
      - PORT=8080

      # Data storage directory (inside the container)
      - DATA_DIR=/data

      # Default UI language: en, fr, de, es, it (users can override via the language menu)
      - DEFAULT_LANG=en

      # Secret key used to sign session cookies
      # ⚠️  IMPORTANT: Change this value in production!
      # Generate a random key with: openssl rand -hex 32
      - SECRET_KEY=change-me-in-production-use-random-32-chars

      # =====================================================================
      # BRANDING
      # =====================================================================

      # Application name (displayed in the header and login page)
      - APP_NAME=myPresence App

      # UI colors (hexadecimal format)
      # PrimaryColor: main color (header, buttons, links)
      - PRIMARY_COLOR=#082415

      # SecondaryColor: secondary color (header gradient)
      - SECONDARY_COLOR=#06532A

      # AccentColor: accent color (badges, highlights)
      - ACCENT_COLOR=#81C071

      # Custom logo
      # To add your logo:
      #   1. Copy your logo.png into the Docker volume
      #      Example: docker cp my-logo.png mypresence-app:/data/logo.png
      #   2. Or mount it directly below
      # - LOGO_PATH=logo.png

      # =====================================================================
      # FONTS
      # =====================================================================

      # Google Fonts import URL (set to empty to disable)
      # Default: Inter (body) + JetBrains Mono (code)
      # - FONT_URL=https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap

      # CSS font-family for the main UI text
      # Must match a font loaded by FONT_URL
      # - FONT_FAMILY='Mona Sans', sans-serif

      # CSS font-family for monospaced text (dates, codes, etc.)
      # - FONT_FAMILY_MONO='JetBrains Mono', ui-monospace, monospace

      # =====================================================================
      # FOOTER
      # =====================================================================

      # Set to "true" to hide the footer (visible by default)
      # - HIDE_FOOTER=true

      # =====================================================================
      # FEATURES
      # =====================================================================

      # Set to "true" to disable all floor plan features:
      # user floor plan page (/floorplan), seat reservation, and admin floor plan management
      # Useful if your organisation does not use desk booking
      # - DISABLE_FLOORPLANS=true

      # Set to "true" to disable project management features:
      # user project time entry page (/projects), project administration, and reporting
      # Useful if your organisation does not use project-based time tracking
      # - DISABLE_PROJECTS=true

      # Set to "true" to disable the REST API entirely:
      # PAT (Personal Access Token) management, Bearer token authentication,
      # all /api/* endpoints and the /api/docs documentation page
      # - DISABLE_API=true

      # =====================================================================
      # OBSERVABILITY
      # =====================================================================

      # Prometheus metrics endpoint token (GET /metrics).
      # Leave unset or empty to disable the endpoint entirely.
      # Set a strong random value in production:
      #   openssl rand -hex 32
      # Prometheus scrape config example (in prometheus.yml):
      #   - job_name: mypresence
      #     bearer_token: <your-token>
      #     static_configs:
      #       - targets: ['mypresence-app:8080']
      # - METRICS_TOKEN=change-me-strong-random-token

      # =====================================================================
      # LOCAL AUTHENTICATION (ADMIN)
      # =====================================================================

      # Local administrator credentials
      # This account has access to the back-office (teams, statuses, activity report)
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin

      # =====================================================================
      # PASSWORD RESET (SMTP)
      # =====================================================================
      #
      # Enable the "Forgot password?" feature for local accounts by providing
      # an SMTP connection string. Leave SMTP_URL unset to disable the feature.
      #
      # Supported schemes:
      #   smtp://user:pass@host:587   — STARTTLS (recommended, e.g. Office 365)
      #   smtps://user:pass@host:465  — direct TLS (e.g. Gmail)
      #   smtp://host:25              — unauthenticated relay
      #
      # - SMTP_URL=smtp://user:password@smtp.example.com:587
      # - SMTP_FROM=noreply@example.com
      # - APP_URL=https://mypresence.example.com

      # =====================================================================
      # SAML2 / SSO AUTHENTICATION (Microsoft Entra ID example)
      # =====================================================================
      #
      # To enable SSO authentication with Microsoft Entra ID:
      #
      # ── STEP 1: Create the application in Entra ID ──
      #
      #   1. Sign in to the Azure portal: https://portal.azure.com
      #   2. Go to "Microsoft Entra ID" > "Enterprise applications"
      #   3. Click "+ New application"
      #   4. Choose "Create your own application"
      #   5. Name it (e.g. "myPresence App") and select
      #      "Integrate any other application you don't find in the gallery"
      #   6. Click "Create"
      #
      # ── STEP 2: Configure SAML SSO in Entra ID ──
      #
      #   1. In the created application, go to "Single sign-on"
      #   2. Choose "SAML"
      #   3. In "Basic SAML Configuration":
      #      - Identifier (Entity ID): https://your-domain.com/saml/metadata
      #      - Reply URL (ACS URL):    https://your-domain.com/saml/acs
      #      - Sign-on URL:            https://your-domain.com/saml/login
      #   4. In "Attributes & Claims", verify that these claims are present:
      #      - emailaddress -> user.mail
      #      - displayname  -> user.displayname
      #   5. In "SAML Signing Certificate", copy
      #      the "App Federation Metadata URL"
      #
      # ── STEP 3: Assign users ──
      #
      #   1. Go to "Users and groups"
      #   2. Add the users or groups that should have access to the application
      #
      # ── STEP 4: Configure the variables below ──
      #
      #   Uncomment and fill in the following variables:
      #

      # IdP metadata URL (copied from step 2.5)
      # Example: https://login.microsoftonline.com/{tenant-id}/federationmetadata/2007-06/federationmetadata.xml?appid={app-id}
      # - SAML_IDP_METADATA_URL=

      # SP Entity ID (must match the Identifier configured in Entra ID)
      # Example: https://mypresence.your-domain.com/saml/metadata
      # - SAML_ENTITY_ID=

      # Public URL of your application (no trailing slash)
      # Example: https://mypresence.your-domain.com
      # - SAML_ROOT_URL=

      # SP certificate (optional - a self-signed certificate is generated if not provided)
      # To provide your own certificate:
      #   1. Place the PEM files in the Docker volume
      #   2. Uncomment the following lines
      # - SAML_SP_CERT_FILE=/data/saml/sp-cert.pem
      # - SAML_SP_KEY_FILE=/data/saml/sp-key.pem

      # ── STEP 5 (optional): RBAC — Map Entra ID groups to application roles ──
      #
      # By default all SSO users receive the "basic" role.
      # You can automatically assign application roles based on Entra group membership.
      #
      # How to set it up in Entra ID:
      #   1. In your Enterprise Application, go to "App roles" and create roles
      #      OR use existing Security Groups / Microsoft 365 Groups
      #   2. Go to "Single sign-on" → "Attributes & Claims"
      #   3. Click "+ Add a group claim"
      #   4. Select "Security groups" (or "All groups"), format: "Object ID"
      #   5. The claim URI will be:
      #      http://schemas.microsoft.com/ws/2008/06/identity/claims/groups
      #      (this is the default value for SAML_GROUPS_CLAIM)
      #   6. Copy the Object ID of each group from "Groups" in Entra ID
      #      and paste it in the corresponding variable below
      #
      # Claim URI for group values (default: Entra standard — only change if your IdP uses a different URI)
      # - SAML_GROUPS_CLAIM=http://schemas.microsoft.com/ws/2008/06/identity/claims/groups
      #
      # Map each Entra group Object ID to an application role:
      # - SAML_GROUP_GLOBAL=<object-id>          # Global admin (all permissions)
      # - SAML_GROUP_TEAM_MANAGER=<object-id>    # Manage teams and memberships
      # - SAML_GROUP_TEAM_LEADER=<object-id>     # View and manage own team activity
      # - SAML_GROUP_STATUS_MANAGER=<object-id>  # Manage presence statuses
      # - SAML_GROUP_ACTIVITY_VIEWER=<object-id> # View all users activity
      # - SAML_GROUP_FLOORPLAN_MANAGER=<object-id> # Manage floor plans and seats
      # - SAML_GROUP_PROJECTS_ADMIN=<object-id> # Manage projects and declare time
      # - SAML_GROUP_PROJECTS_VIEWER=<object-id> # View project time entries and reports
      #
      # Notes:
      # - A user can match multiple groups and will receive all corresponding roles
      # - If no group matches, the user falls back to the "basic" role
      # - Roles are re-evaluated at every login

#volumes:
#  mypresence-data:
#    driver: local

# =============================================================================
# NOTES
# =============================================================================
#
# To mount a custom logo directly:
#   volumes:
#     - mypresence-data:/data
#     - ./my-logo.png:/data/logo.png:ro
#
# To access the SQLite database:
#   docker exec -it mypresence-app cat /data/app.db > backup.db
#
# To view logs:
#   docker compose logs -f mypresence
#
# To restart after a config change:
#   docker compose down && docker compose up -d
#
# =============================================================================
