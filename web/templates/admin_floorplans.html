{{define "content"}}
{{with .Data}}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" x-data="adminFloorplanApp({{json .Floorplans}})">

    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-gray-900">{{index $.T "fp.admin_title"}}</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- LEFT: Floorplan list -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="font-semibold text-gray-800">{{index $.T "fp.plans"}}</h2>
                    <button @click="showCreate = !showCreate"
                            class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium">
                        {{index $.T "fp.new"}}
                    </button>
                </div>

                <!-- Create form -->
                <div x-show="showCreate" x-transition class="px-4 py-3 border-b border-gray-100 bg-gray-50">
                    <form @submit.prevent="createFloorplan()">
                        <div class="flex gap-2">
                        <input x-model="newName" type="text" placeholder="{{index $.T "fp.plan_name_ph"}}" required
                               class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary/50">
                            <button type="submit"
                                    class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium">
                                {{index $.T "admin.create"}}
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Plans list -->
                <ul class="divide-y divide-gray-100">
                    {{range .Floorplans}}
                    <li class="group">
                        <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 cursor-pointer"
                             @click="selectFP({{.ID}}, '{{js .Name}}')"
                             :class="selectedFpID === {{.ID}} ? 'bg-primary/5 border-l-4 border-primary' : ''">
                            <div>
                                <div x-show="editingFpID !== {{.ID}}" class="font-medium text-gray-800 text-sm">{{.Name}}</div>
                                <form x-show="editingFpID === {{.ID}}" @submit.prevent="renameFloorplan({{.ID}})" @click.stop>
                                    <input x-ref="rn{{.ID}}" x-model="editName" type="text"
                                           class="px-2 py-1 border border-primary rounded text-sm focus:outline-none"
                                           @blur="editingFpID = null">
                                </form>
                            </div>
                            <div class="flex items-center gap-1.5 opacity-0 group-hover:opacity-100 transition">
                                <button @click.stop="startRename({{.ID}}, '{{js .Name}}')"
                                        class="p-1 hover:text-primary text-gray-400" title="Renommer">✏️</button>
                                <button @click.stop="confirmDeleteFP({{.ID}}, '{{js .Name}}')"
                                        class="p-1 hover:text-red-500 text-gray-400" title="Supprimer">🗑️</button>
                            </div>
                        </div>
                    </li>
                    {{else}}
                    <li class="px-4 py-8 text-center text-gray-400 text-sm">{{index $.T "fp.none"}}</li>
                    {{end}}
                </ul>
            </div>
        </div>

        <!-- RIGHT: Seat editor -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-xl shadow-md overflow-hidden">

                <template x-if="selectedFpID === 0">
                    <div class="p-12 text-center text-gray-400">
                        <p class="text-2xl mb-2">👈</p>
                        <p class="text-sm">{{index $.T "fp.select_hint"}}</p>
                    </div>
                </template>

                <template x-if="selectedFpID !== 0">
                    <div>
                        <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                            <span class="font-semibold text-gray-800" x-text="selectedFpName"></span>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-400">{{index $.T "fp.editor_hint"}}</span>
                                <!-- Upload image button -->
                                <label class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm font-medium transition">
                                    {{index $.T "fp.upload_image"}}
                                    <input type="file" class="sr-only" accept="image/*" @change="uploadImage($event)">
                                </label>
                            </div>
                        </div>

                        <!-- Image area -->
                        <div x-ref="imgContainer"
                             class="relative overflow-auto bg-gray-50"
                             :style="'min-height: 300px; max-height: 70vh; touch-action: pan-x pan-y; cursor: ' + (draggingSeat !== null ? 'grabbing' : 'crosshair') + ';'"
                             @click="handleImageClick($event)">

                            <template x-if="!currentImage">
                                <div class="absolute inset-0 flex items-center justify-center text-gray-400 text-sm pointer-events-none">
                                    <span>{{index $.T "fp.upload_hint"}}</span>
                                </div>
                            </template>

                            <template x-if="currentImage">
                                <div class="relative inline-block">
                                    <img :src="currentImage + '?t=' + cacheBust" alt="Plan" class="block max-w-none" x-ref="planImg" style="min-width:600px">

                                    <!-- Existing seats -->
                                    <template x-for="seat in currentSeats" :key="seat.id">
                                        <div :style="'position:absolute;left:'+seat.x_pct+'%;top:'+seat.y_pct+'%;transform:translate(-50%,-50%);z-index:'+(draggingSeat===seat.id?10:1)+';'"
                                             :class="draggingSeat === seat.id
                                                 ? 'group/seat w-8 h-8 rounded-full bg-amber-400 text-white text-xs font-bold flex items-center justify-center shadow-xl border-2 border-amber-600 scale-125 cursor-grabbing'
                                                 : 'group/seat w-8 h-8 rounded-full bg-primary text-white text-xs font-bold flex items-center justify-center shadow-md border-2 border-white cursor-grab'"
                                             @mousedown.prevent.stop="startDragSeat(seat, $event)"
                                             @click.stop
                                             :title="seat.label">
                                            <span x-text="seat.label.length<=3?seat.label:seat.label.substring(0,3)"></span>
                                            <!-- Hover: delete button (hidden while dragging) -->
                                            <button x-show="draggingSeat !== seat.id"
                                                    @mousedown.stop
                                                    @click.stop="confirmDeleteSeat(seat)"
                                                    class="absolute -top-2 -right-2 hidden group-hover/seat:flex w-5 h-5 bg-red-500 text-white rounded-full text-xs items-center justify-center shadow">×</button>
                                        </div>
                                    </template>

                                    <!-- Pending seat pin (being placed) -->
                                    <template x-if="pendingSeat">
                                        <div :style="'position:absolute;left:'+pendingSeat.x_pct+'%;top:'+pendingSeat.y_pct+'%;transform:translate(-50%,-50%);'"
                                             class="w-8 h-8 rounded-full bg-green-400 text-white text-xs font-bold flex items-center justify-center shadow-md border-2 border-green-600 animate-pulse">
                                            <span>?</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Add seat modal -->
    <div x-show="seatModal.show" x-transition.opacity
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @click.self="seatModal.show = false; pendingSeat = null">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold text-gray-800 mb-1">{{index $.T "fp.new_seat"}}</h3>
            <p class="text-sm text-gray-500 mb-4">{{index $.T "fp.seat_label_hint"}}</p>
            <form @submit.prevent="createSeat()">
                <input x-model="seatModal.label" type="text" :placeholder="_t['fp.seat_label_ph']" maxlength="10" required autofocus
                       x-ref="seatLabelInput"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm mb-4 focus:ring-2 focus:ring-primary/50">
                <div class="flex gap-3 justify-end">
                    <button type="button" @click="seatModal.show = false; pendingSeat = null"
                            class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium" x-text="_t['admin.cancel']">
                    </button>
                    <button type="submit"
                            class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium" x-text="_t['admin.add']">
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm delete modal -->
    <div x-show="confirm.show" x-transition.opacity
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @click.self="confirm.show = false">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold text-gray-800 mb-2" x-text="confirm.title"></h3>
            <p class="text-sm text-gray-500 mb-5" x-text="confirm.message"></p>
            <div class="flex gap-3 justify-end">
                <button @click="confirm.show = false" class="text-xs px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition font-medium" x-text="_t['admin.cancel']">
                </button>
                <button @click="confirm.action(); confirm.show = false"
                        class="px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600 transition" x-text="_t['admin.delete']">
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         :class="toast.error ? 'bg-red-600' : 'bg-green-600'"
         class="fixed bottom-6 right-6 z-50 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium"
         x-text="toast.message">
    </div>
</div>

<script>
function adminFloorplanApp(allFloorplans) {
    return {
        allFloorplans: allFloorplans || [],
        showCreate: false,
        newName: '',
        selectedFpID: 0,
        selectedFpName: '',
        editingFpID: null,
        editName: '',
        currentImage: null,
        currentSeats: [],
        cacheBust: Date.now(),
        draggingSeat: null,
        pendingSeat: null,
        seatModal: { show: false, label: '' },
        confirm: { show: false, title: '', message: '', action: ()=>{} },
        toast: { show: false, message: '', error: false },

        showToast(message, error = false) {
            this.toast = { show: true, message, error };
            setTimeout(() => this.toast.show = false, 3000);
        },

        async selectFP(id, name) {
            this.selectedFpID = id;
            this.selectedFpName = name;
            // Look up image_path from embedded data
            const fp = this.allFloorplans.find(f => f.id === id);
            this.currentImage = (fp && fp.image_path) ? `/floorplan-img/${fp.image_path}` : null;
            this.cacheBust = Date.now();
            await this.loadSeats();
        },

        async loadSeats() {
            if (!this.selectedFpID) return;
            const resp = await fetch(`/api/admin/seats?floorplan_id=${this.selectedFpID}`);
            if (resp.ok) {
                this.currentSeats = await resp.json();
            }
        },

        async createFloorplan() {
            if (!this.newName.trim()) return;
            const resp = await fetch('/admin/floorplans', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: this.newName.trim() })
            });
            if (resp.ok) {
                this.showToast(_t['fp.plans']);
                window.location.reload();
            } else {
                const d = await resp.json();
                this.showToast(d.error || _t['fp.error'], true);
            }
        },

        startRename(id, name) {
            this.editingFpID = id;
            this.editName = name;
            this.$nextTick(() => {
                const el = this.$refs[`rn${id}`];
                if (el) el.focus();
            });
        },

        async renameFloorplan(id) {
            if (!this.editName.trim()) { this.editingFpID = null; return; }
            const resp = await fetch(`/admin/floorplans/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: this.editName.trim() })
            });
            if (resp.ok) {
                this.showToast(_t['fp.plans']);
                if (this.selectedFpID === id) this.selectedFpName = this.editName;
                window.location.reload();
            } else {
                const d = await resp.json();
                this.showToast(d.error || _t['fp.error'], true);
            }
            this.editingFpID = null;
        },

        confirmDeleteFP(id, name) {
            this.confirm = {
                show: true,
                title: _t['admin.delete'] + ' ' + _t['fp.plans'],
                message: `${_t['admin.delete']} "${name}" ?`,
                action: async () => {
                    const resp = await fetch(`/admin/floorplans/${id}`, { method: 'DELETE' });
                    if (resp.ok) {
                        this.showToast(_t['fp.plans']);
                        if (this.selectedFpID === id) { this.selectedFpID = 0; this.currentSeats = []; }
                        window.location.reload();
                    } else {
                        const d = await resp.json();
                        this.showToast(d.error || _t['fp.error'], true);
                    }
                }
            };
        },

        async uploadImage(event) {
            const file = event.target.files[0];
            if (!file || !this.selectedFpID) return;
            const formData = new FormData();
            formData.append('image', file);
            const resp = await fetch(`/admin/floorplans/${this.selectedFpID}/image`, {
                method: 'POST',
                body: formData
            });
            if (resp.ok) {
                const d = await resp.json();
                this.currentImage = d.image_path ? `/floorplan-img/${d.image_path}` : null;
                this.cacheBust = Date.now();
                // Update embedded allFloorplans array
                const idx = this.allFloorplans.findIndex(f => f.id === this.selectedFpID);
                if (idx >= 0) this.allFloorplans[idx].image_path = d.image_path;
                this.showToast(_t['fp.upload_image']);
            } else {
                const d = await resp.json();
                this.showToast(d.error || _t['fp.error'], true);
            }
            event.target.value = '';
        },

        handleImageClick(event) {
            if (!this.selectedFpID || !this.currentImage) return;
            const img = this.$refs.planImg;
            if (!img) return;
            // Determine click position relative to the image
            const rect = img.getBoundingClientRect();
            const xPct = ((event.clientX - rect.left) / rect.width) * 100;
            const yPct = ((event.clientY - rect.top) / rect.height) * 100;
            this.pendingSeat = { x_pct: xPct.toFixed(2), y_pct: yPct.toFixed(2) };
            this.seatModal = { show: true, label: '' };
            this.$nextTick(() => { if (this.$refs.seatLabelInput) this.$refs.seatLabelInput.focus(); });
        },

        async createSeat() {
            if (!this.pendingSeat || !this.seatModal.label.trim()) return;
            const resp = await fetch(`/admin/floorplans/${this.selectedFpID}/seats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    label: this.seatModal.label.trim(),
                    x_pct: parseFloat(this.pendingSeat.x_pct),
                    y_pct: parseFloat(this.pendingSeat.y_pct)
                })
            });
            if (resp.ok) {
                this.showToast(_t['fp.new_seat']);
                await this.loadSeats();
            } else {
                const d = await resp.json();
                this.showToast(d.error || _t['fp.error'], true);
            }
            this.seatModal = { show: false, label: '' };
            this.pendingSeat = null;
        },

        startDragSeat(seat, event) {
            this.draggingSeat = seat.id;
            const originalX = seat.x_pct;
            const originalY = seat.y_pct;
            const onMove = (e) => {
                const img = this.$refs.planImg;
                if (!img) return;
                const rect = img.getBoundingClientRect();
                seat.x_pct = parseFloat(Math.min(100, Math.max(0, (e.clientX - rect.left) / rect.width * 100)).toFixed(2));
                seat.y_pct = parseFloat(Math.min(100, Math.max(0, (e.clientY - rect.top)  / rect.height * 100)).toFixed(2));
            };
            const onUp = async (e) => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                this.draggingSeat = null;
                const img = this.$refs.planImg;
                if (!img) return;
                const rect = img.getBoundingClientRect();
                const xPct = parseFloat(Math.min(100, Math.max(0, (e.clientX - rect.left) / rect.width * 100)).toFixed(2));
                const yPct = parseFloat(Math.min(100, Math.max(0, (e.clientY - rect.top)  / rect.height * 100)).toFixed(2));
                // Skip API call if position barely changed (treated as a click)
                if (Math.abs(xPct - parseFloat(originalX)) < 0.5 && Math.abs(yPct - parseFloat(originalY)) < 0.5) {
                    seat.x_pct = originalX;
                    seat.y_pct = originalY;
                    return;
                }
                seat.x_pct = xPct;
                seat.y_pct = yPct;
                const resp = await fetch(`/admin/seats/${seat.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ label: seat.label, x_pct: xPct, y_pct: yPct })
                });
                if (resp.ok) {
                    this.showToast(_t['fp.select_hint']);
                } else {
                    seat.x_pct = originalX;
                    seat.y_pct = originalY;
                    this.showToast(_t['fp.error'], true);
                }
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        },

        confirmDeleteSeat(seat) {
            this.confirm = {
                show: true,
                title: _t['admin.delete'] + ' ' + _t['fp.free'],
                message: `${_t['admin.delete']} "${seat.label}" ?`,
                action: async () => {
                    const resp = await fetch(`/admin/seats/${seat.id}`, { method: 'DELETE' });
                    if (resp.ok) {
                        this.showToast(_t['admin.delete']);
                        await this.loadSeats();
                    } else {
                        const d = await resp.json();
                        this.showToast(d.error || _t['fp.error'], true);
                    }
                }
            };
        }
    };
}
</script>
{{end}}
{{end}}
